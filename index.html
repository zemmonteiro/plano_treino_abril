<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Plano Abril 2026</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: "DM Sans", sans-serif;
  background: #f7f5f2;
  padding: 40px;
  color: #1a1612;
}

h1 {
  font-family: "DM Serif Display";
  font-size: 40px;
  margin-bottom: 20px;
}

.week { margin-bottom: 40px; }
.day { margin-bottom: 20px; }

.card {
  background: white;
  padding: 12px 14px;
  border-radius: 14px;
  margin-bottom: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.tag { font-size: 12px; opacity: 0.8; }

.actions {
  display: flex;
  gap: 6px;
}

button {
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 11px;
  cursor: pointer;
}

.save-btn { background: #eee; }
.view-btn {
  background: #2a9e6a;
  color: white;
  display: none;
}

.list {
  min-height: 20px;
}
</style>

<!-- SORTABLE -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<h1>Plano Abril 2026</h1>

<div id="app"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

const API_URL = "https://script.google.com/macros/s/AKfycbwt6R_v15T7YZU4biC5phKDv6Kd02HKmIdtABinZHU15Lf5olggYnjLc7dc6zrpdOLK/exec";

const dataPlano = [
  {
    semana: 1,
    dias: {
      "Segunda": ["Natação · 1h","Força · 1h"],
      "Terça": ["Bike · 1h","Corrida · 45m"],
      "Quarta": ["Bike · 1h","Corrida · 45m"],
      "Quinta": ["Corrida · 1h"],
      "Sexta": [],
      "Sábado": ["Long Bike · 3h30","Corrida · 30m"],
      "Domingo": ["Patricia · 1h15"]
    }
  }
];

// duplicar semanas
while(dataPlano.length < 4){
  dataPlano.push(JSON.parse(JSON.stringify(dataPlano[dataPlano.length-1])));
  dataPlano[dataPlano.length-1].semana = dataPlano.length;
}

const app = document.getElementById("app");

// RENDER
dataPlano.forEach(sem => {

  const w = document.createElement("div");
  w.className = "week";
  w.innerHTML = `<h2>Semana ${sem.semana}</h2>`;

  Object.entries(sem.dias).forEach(([dia, treinos]) => {

    const d = document.createElement("div");
    d.className = "day";
    d.innerHTML = `<h3>${dia}</h3>`;

    const list = document.createElement("div");
    list.className = "list";
    list.dataset.dia = dia;

    if(treinos.length === 0){
      const p = document.createElement("p");
      p.textContent = "Descanso";
      d.appendChild(p);
    }

    treinos.forEach((t, i) => {

      const id = `abril-s${sem.semana}-${dia}-${i}`;

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = id;
      card.dataset.dia = dia;

      card.innerHTML = `
        <div class="tag">${t}</div>
        <div class="actions">
          <button class="save-btn">Guardar</button>
          <button class="view-btn">Ver treino</button>
        </div>
        <input data-id="${id}" placeholder="link">
      `;

      const input = card.querySelector("input");
      const saveBtn = card.querySelector(".save-btn");
      const viewBtn = card.querySelector(".view-btn");

      // estado inicial
      card.dataset.hasLink = "0";

      saveBtn.onclick = () => {
        const link = prompt("Cola o link do treino:");
        if(!link) return;

        input.value = link;
        card.dataset.hasLink = "1";

        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            id,
            link,
            dia: card.dataset.dia
          })
        });

        viewBtn.style.display = "inline-block";
        viewBtn.onclick = () => window.open(link, "_blank");
      };

      list.appendChild(card);
    });

    d.appendChild(list);
    w.appendChild(d);
  });

  app.appendChild(w);
});

// DRAG & DROP
document.querySelectorAll(".list").forEach(list => {

  new Sortable(list, {
    group: "treinos",
    animation: 150,

    onAdd: function (evt) {

      const card = evt.item;
      const newDia = evt.to.dataset.dia;
      const id = card.dataset.id;
      const input = card.querySelector("input");

      card.dataset.dia = newDia;

      if(card.dataset.hasLink === "1") {
        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            id,
            dia: newDia,
            link: input.value
          })
        });
      }
    }
  });

});

// LOAD LINKS
fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    if(!data) return;

    document.querySelectorAll(".card").forEach(card => {

      const id = card.dataset.id;
      const input = card.querySelector("input");
      const viewBtn = card.querySelector(".view-btn");

      if(data[id] && data[id].link){
        input.value = data[id].link;
        card.dataset.hasLink = "1";

        viewBtn.style.display = "inline-block";
        viewBtn.onclick = () => window.open(data[id].link, "_blank");
      }

    });
  });

});
</script>

</body>
</html>
