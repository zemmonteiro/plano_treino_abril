<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Plano Abril 2026</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body { font-family: sans-serif; padding: 20px; }
.week { margin-bottom: 30px; }
.day { margin-bottom: 15px; }
.card { background: #eee; padding: 10px; margin: 5px 0; cursor: grab; }
.list { min-height: 20px; }
</style>

</head>

<body>

<h1>Plano Abril</h1>

<!-- 🔥 ISTO É O MAIS IMPORTANTE -->
<div id="app"></div>

<script>
window.onload = function () {

const API_URL = "https://script.google.com/macros/s/AKfycbwt6R_v15T7YZU4biC5phKDv6Kd02HKmIdtABinZHU15Lf5olggYnjLc7dc6zrpdOLK/exec";

const dataPlano = {
  "Segunda": ["Natação","Força"],
  "Terça": ["Bike","Corrida"],
  "Quarta": ["Bike","Corrida"],
  "Quinta": ["Corrida"],
  "Sexta": [],
  "Sábado": ["Long Bike","Corrida"],
  "Domingo": ["Patricia"]
};

const app = document.getElementById("app");

if(!app){
  console.error("ERRO: #app não existe");
  return;
}

// render
Object.entries(dataPlano).forEach(([dia, treinos]) => {

  const d = document.createElement("div");
  d.className = "day";
  d.innerHTML = "<h3>"+dia+"</h3>";

  const list = document.createElement("div");
  list.className = "list";
  list.dataset.dia = dia;

  treinos.forEach((t, i) => {

    const id = dia + "-" + i;

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = id;
    card.dataset.dia = dia;

    card.innerHTML = t;

    list.appendChild(card);
  });

  d.appendChild(list);
  app.appendChild(d);
});

// drag
document.querySelectorAll(".list").forEach(list => {
  new Sortable(list, {
    group: "treinos",
    animation: 150,

    onAdd: function(evt){
      const card = evt.item;
      const newDia = evt.to.dataset.dia;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          id: card.dataset.id,
          dia: newDia
        })
      });
    }
  });
});

};
</script>

</body>
</html>
