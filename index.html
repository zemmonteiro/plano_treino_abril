<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Plano Abril</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body { font-family: sans-serif; padding: 20px; }
.day { margin-bottom: 20px; }
.card {
  background: #eee;
  padding: 10px;
  margin: 5px 0;
  display: flex;
  justify-content: space-between;
}
.actions button { margin-left: 5px; }
.list { min-height: 20px; }
</style>

</head>

<body>

<h1>Plano Abril</h1>
<div id="app"></div>

<script>
window.onload = function () {

const API_URL = "https://script.google.com/macros/s/AKfycbwt6R_v15T7YZU4biC5phKDv6Kd02HKmIdtABinZHU15Lf5olggYnjLc7dc6zrpdOLK/exec";

const dataPlano = {
  "Segunda": ["Natação","Força"],
  "Terça": ["Bike","Corrida"],
  "Quarta": ["Bike","Corrida"],
  "Quinta": ["Corrida"],
  "Sexta": [],
  "Sábado": ["Long Bike","Corrida"],
  "Domingo": ["Patricia"]
};

const app = document.getElementById("app");
const cardsMap = {};

// RENDER
Object.entries(dataPlano).forEach(([dia, treinos]) => {

  const d = document.createElement("div");
  d.className = "day";
  d.innerHTML = "<h3>"+dia+"</h3>";

  const list = document.createElement("div");
  list.className = "list";
  list.dataset.dia = dia;

  treinos.forEach((t, i) => {

    const id = "treino-" + dia + "-" + i; // 🔥 FIX

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = id;
    card.dataset.dia = dia;

    card.innerHTML = `
      <span>${t}</span>
      <div class="actions">
        <button class="save">Guardar</button>
        <button class="view" style="display:none">Ver</button>
      </div>
    `;

    const saveBtn = card.querySelector(".save");
    const viewBtn = card.querySelector(".view");

    saveBtn.onclick = () => {
      const link = prompt("Link do treino:");
      if(!link) return;

      card.dataset.link = link;

      viewBtn.style.display = "inline-block";
      viewBtn.onclick = () => window.open(link, "_blank");

      fetch(API_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
          id,
          dia: card.dataset.dia,
          link
        })
      });
    };

    list.appendChild(card);
    cardsMap[id] = card;
  });

  d.appendChild(list);
  app.appendChild(d);
});

// DRAG
document.querySelectorAll(".list").forEach(list => {
  new Sortable(list, {
    group: "treinos",
    animation: 150,

    onAdd: function(evt){
      const card = evt.item;
      const id = card.dataset.id;
      const newDia = evt.to.dataset.dia;

      card.dataset.dia = newDia;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          id,
          dia: newDia,
          link: card.dataset.link || ""
        })
      });
    }
  });
});

// LOAD
fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    Object.keys(data).forEach(id => {

      const item = data[id];
      const card = cardsMap[id];

      if(!card) return;

      const viewBtn = card.querySelector(".view");

      if(item.link){
        card.dataset.link = item.link;
        viewBtn.style.display = "inline-block";
        viewBtn.onclick = () => window.open(item.link, "_blank");
      }

      if(item.dia){
        const newList = document.querySelector(`.list[data-dia="${item.dia}"]`);
        if(newList){
          newList.appendChild(card);
          card.dataset.dia = item.dia;
        }
      }

    });

  });

};
</script>

</body>
</html>
