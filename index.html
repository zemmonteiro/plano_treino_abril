<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async function () {

const API_URL = "https://script.google.com/macros/s/AKfycbwt6R_v15T7YZU4biC5phKDv6Kd02HKmIdtABinZHU15Lf5olggYnjLc7dc6zrpdOLK/exec";

// 🔹 plano original
const dataPlano = [
  {
    semana: 1,
    dias: {
      "Segunda": ["Natação · 1h","Força · 1h"],
      "Terça": ["Bike · 1h","Corrida · 45m"],
      "Quarta": ["Bike · 1h","Corrida · 45m"],
      "Quinta": ["Corrida · 1h"],
      "Sexta": [],
      "Sábado": ["Long Bike · 3h30","Corrida · 30m"],
      "Domingo": ["Patricia · 1h15"]
    }
  }
];

// duplicar semanas
while(dataPlano.length < 4){
  dataPlano.push(JSON.parse(JSON.stringify(dataPlano[dataPlano.length-1])));
  dataPlano[dataPlano.length-1].semana = dataPlano.length;
}

// 🔹 buscar dados guardados
let saved = {};
try {
  saved = await fetch(API_URL).then(r => r.json());
} catch(e) {
  console.log("erro API");
}

const app = document.getElementById("app");

// 🔥 RENDER
dataPlano.forEach(sem => {

  const w = document.createElement("div");
  w.className = "week";
  w.innerHTML = `<h2>Semana ${sem.semana}</h2>`;

  Object.entries(sem.dias).forEach(([diaOriginal, treinos]) => {

    const d = document.createElement("div");
    d.className = "day";
    d.innerHTML = `<h3>${diaOriginal}</h3>`;

    const list = document.createElement("div");
    list.className = "list";
    list.dataset.dia = diaOriginal;

    treinos.forEach((t, i) => {

      let id = `abril-s${sem.semana}-${diaOriginal}-${i}`;

      // 🔥 se já foi movido → usar dia guardado
      if(saved[id] && saved[id].dia){
        list.dataset.override = true;
      }

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = id;
      card.dataset.dia = diaOriginal;

      const link = saved[id]?.link || "";

      card.innerHTML = `
        <div class="tag">${t}</div>
        <div class="actions">
          <button class="save-btn">Guardar</button>
          <button class="view-btn" style="${link ? 'display:inline-block' : 'display:none'}">Ver treino</button>
        </div>
        <input value="${link}">
      `;

      const input = card.querySelector("input");
      const saveBtn = card.querySelector(".save-btn");
      const viewBtn = card.querySelector(".view-btn");

      card.dataset.hasLink = link ? "1" : "0";

      // guardar link
      saveBtn.onclick = () => {
        const newLink = prompt("Cola o link do treino:", input.value);
        if(!newLink) return;

        input.value = newLink;
        card.dataset.hasLink = "1";

        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            id,
            link: newLink,
            dia: card.dataset.dia
          })
        });

        viewBtn.style.display = "inline-block";
        viewBtn.onclick = () => window.open(newLink, "_blank");
      };

      if(link){
        viewBtn.onclick = () => window.open(link, "_blank");
      }

      list.appendChild(card);
    });

    d.appendChild(list);
    w.appendChild(d);
  });

  app.appendChild(w);
});

// 🔥 aplicar movimentos guardados (MUITO IMPORTANTE)
Object.keys(saved).forEach(id => {
  const item = saved[id];
  if(!item.dia) return;

  const card = document.querySelector(`[data-id="${id}"]`);
  const newList = document.querySelector(`.list[data-dia="${item.dia}"]`);

  if(card && newList){
    newList.appendChild(card);
    card.dataset.dia = item.dia;
  }
});

// 🔥 drag
document.querySelectorAll(".list").forEach(list => {
  new Sortable(list, {
    group: "treinos",
    animation: 150,

    onAdd: function(evt){
      const card = evt.item;
      const id = card.dataset.id;
      const newDia = evt.to.dataset.dia;
      const input = card.querySelector("input");

      card.dataset.dia = newDia;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          id,
          dia: newDia,
          link: input.value || ""
        })
      });
    }
  });
});

});
</script>
