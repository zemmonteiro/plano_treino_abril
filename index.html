<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Plano Abril 2026</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: "DM Sans", sans-serif;
  background: #f7f5f2;
  padding: 40px;
}

.week { margin-bottom: 40px; }
.day { margin-bottom: 20px; }

.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

.list { min-height: 20px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<h1>Plano Abril 2026</h1>
<div id="app"></div>

<script>
document.addEventListener("DOMContentLoaded", async function () {

const API_URL = "https://script.google.com/macros/s/AKfycbwt6R_v15T7YZU4biC5phKDv6Kd02HKmIdtABinZHU15Lf5olggYnjLc7dc6zrpdOLK/exec";

// 🔹 plano base
const basePlano = {
  "Segunda": ["Natação · 1h","Força · 1h"],
  "Terça": ["Bike · 1h","Corrida · 45m"],
  "Quarta": ["Bike · 1h","Corrida · 45m"],
  "Quinta": ["Corrida · 1h"],
  "Sexta": [],
  "Sábado": ["Long Bike · 3h30","Corrida · 30m"],
  "Domingo": ["Patricia · 1h15"]
};

// 🔹 buscar dados guardados
let saved = {};
try {
  saved = await fetch(API_URL).then(r => r.json());
} catch(e) {
  console.log("erro a carregar dados");
}

// 🔹 criar estrutura final
let dias = JSON.parse(JSON.stringify(basePlano));

// mover treinos se tiverem dia guardado
Object.keys(saved).forEach(id => {
  const item = saved[id];
  if(item.dia){
    const parts = id.split("-");
    const nome = parts.slice(3).join("-");

    // remover de todos os dias
    Object.keys(dias).forEach(d => {
      dias[d] = dias[d].filter(t => t !== nome);
    });

    // adicionar ao novo dia
    if(!dias[item.dia]) dias[item.dia] = [];
    dias[item.dia].push(nome);
  }
});

// 🔹 render
const app = document.getElementById("app");

Object.entries(dias).forEach(([dia, treinos]) => {

  const d = document.createElement("div");
  d.className = "day";
  d.innerHTML = `<h3>${dia}</h3>`;

  const list = document.createElement("div");
  list.className = "list";
  list.dataset.dia = dia;

  treinos.forEach((t, i) => {

    const id = `abril-s1-${dia}-${t}`;

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = id;

    const link = saved[id]?.link || "";

    card.innerHTML = `
      <span>${t}</span>
      <button onclick="window.open('${link}','_blank')">Ver</button>
    `;

    if(link){
      card.dataset.hasLink = "1";
    } else {
      card.dataset.hasLink = "0";
    }

    list.appendChild(card);
  });

  d.appendChild(list);
  app.appendChild(d);
});

// 🔹 drag
document.querySelectorAll(".list").forEach(list => {
  new Sortable(list, {
    group: "treinos",
    animation: 150,

    onAdd: function(evt){
      const card = evt.item;
      const id = card.dataset.id;
      const newDia = evt.to.dataset.dia;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          id,
          dia: newDia
        })
      });
    }
  });
});

});
</script>

</body>
</html>
