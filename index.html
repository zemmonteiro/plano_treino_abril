<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plano de Treino · Abril 2026</title>

  <style>
    body { font-family: Arial; padding: 20px; }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 20px;
      margin-bottom: 4px;
      background: #eee;
      font-size: 12px;
    }

    .session-block {
      margin-bottom: 10px;
    }

    .link-input {
      display: block;
      margin-top: 4px;
      padding: 4px 6px;
      font-size: 11px;
      width: 250px;
    }
  </style>
</head>

<body>

<h1>Plano Abril 2026</h1>

<h2>Segunda</h2>

<div class="session-block">
  <div class="pill">Natação · 1h</div>
  <input class="link-input" placeholder="Colar link..."
    data-id="abril-s1-seg-natacao">
</div>

<div class="session-block">
  <div class="pill">Força · 1h</div>
  <input class="link-input" placeholder="Colar link..."
    data-id="abril-s1-seg-forca">
</div>


<h2>Terça</h2>

<div class="session-block">
  <div class="pill">Bike · 1h</div>
  <input class="link-input" placeholder="Colar link..."
    data-id="abril-s1-terca-bike">
</div>

<div class="session-block">
  <div class="pill">Corrida · 45m</div>
  <input class="link-input" placeholder="Colar link..."
    data-id="abril-s1-terca-run">
</div>


<!-- SCRIPT -->
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwN5NfRUJVIbAfjmM0sisiMChc2D5GYGnR5ld-CKL_2qXuMVFqVNGd6OrFFUZ5NU997/exec";

const inputs = document.querySelectorAll('.link-input');

// 🔄 CARREGAR DADOS
fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    inputs.forEach(input => {
      const id = input.dataset.id;
      if (data[id]) {
        input.value = data[id];
      }
    });
  });

// 💾 GUARDAR AUTOMÁTICO
inputs.forEach(input => {
  input.addEventListener('input', () => {
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        id: input.dataset.id,
        link: input.value
      })
    });
  });
});
</script>

</body>
</html>
