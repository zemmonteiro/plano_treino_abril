<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Plano Abril 2026</title>

<style>
body {
  font-family: sans-serif;
  padding: 30px;
  background: #f7f5f2;
}

.week { margin-bottom: 40px; }

.day {
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.actions {
  display: flex;
  gap: 5px;
}

button {
  border: none;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.save-btn { background: #ddd; }
.view-btn { background: #2a9e6a; color: white; display: none; }
.edit-btn { background: #444; color: white; }

select {
  padding: 5px;
}
</style>
</head>

<body>

<h1>Plano Abril 2026</h1>
<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwt6R_v15T7YZU4biC5phKDv6Kd02HKmIdtABinZHU15Lf5olggYnjLc7dc6zrpdOLK/exec";

const diasValidos = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];

const dataPlano = {
  "Segunda": ["Natação · 1h","Força · 1h"],
  "Terça": ["Bike · 1h","Corrida · 45m"],
  "Quarta": ["Bike · 1h","Corrida · 45m"],
  "Quinta": ["Corrida · 1h"],
  "Sexta": [],
  "Sábado": ["Long Bike · 3h30","Corrida · 30m"],
  "Domingo": ["Patricia · 1h15"]
};

const app = document.getElementById("app");
const cards = {};

// RENDER
Object.entries(dataPlano).forEach(([dia, treinos]) => {

  const week = document.createElement("div");
  week.className = "week";

  week.innerHTML = `<h2>${dia}</h2>`;

  treinos.forEach((t, i) => {

    const id = "treino-" + dia + "-" + i;

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = id;
    card.dataset.dia = dia;

    card.innerHTML = `
      <div>
        <strong>${t}</strong>
        <div>Dia: <span class="dia-label">${dia}</span></div>
      </div>

      <div class="actions">
        <button class="save-btn">Link</button>
        <button class="edit-btn">Editar</button>
        <button class="view-btn">Ver</button>
      </div>
    `;

    const saveBtn = card.querySelector(".save-btn");
    const editBtn = card.querySelector(".edit-btn");
    const viewBtn = card.querySelector(".view-btn");
    const diaLabel = card.querySelector(".dia-label");

    // LINK
    saveBtn.onclick = () => {
      const link = prompt("Link do treino:");
      if(!link) return;

      card.dataset.link = link;
      viewBtn.style.display = "inline-block";
      viewBtn.onclick = () => window.open(link, "_blank");

      save(card.dataset.id, card.dataset.dia, link);
    };

    // EDITAR DIA
    editBtn.onclick = () => {
      const novoDia = prompt(
        "Novo dia (Segunda a Domingo):",
        card.dataset.dia
      );

      if(!novoDia || !diasValidos.includes(novoDia)) {
        alert("Dia inválido");
        return;
      }

      card.dataset.dia = novoDia;
      diaLabel.textContent = novoDia;

      save(card.dataset.id, novoDia, card.dataset.link || "");
    };

    cards[id] = card;
    week.appendChild(card);
  });

  app.appendChild(week);
});

// LOAD
fetch(API_URL)
  .then(r => r.json())
  .then(data => {

    Object.keys(data).forEach(id => {

      const item = data[id];
      const card = cards[id];

      if(!card) return;

      const viewBtn = card.querySelector(".view-btn");
      const diaLabel = card.querySelector(".dia-label");

      if(item.link){
        card.dataset.link = item.link;
        viewBtn.style.display = "inline-block";
        viewBtn.onclick = () => window.open(item.link, "_blank");
      }

      if(item.dia){
        card.dataset.dia = item.dia;
        diaLabel.textContent = item.dia;
      }

    });

  });

// SAVE
function save(id, dia, link){
  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id,
      dia,
      link
    })
  });
}
</script>

</body>
</html>
